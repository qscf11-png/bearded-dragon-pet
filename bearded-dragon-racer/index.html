<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鬃獅蜥賽車大冒險</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../index.html" class="back-link">⬅ 返回主畫面</a>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-layer">
            <div class="score-board">距離: <span id="score">0</span>m</div>
        </div>

        <div id="overlay">
            <div class="content">
                <h1 id="overlay-title">鬃獅蜥賽車大冒險</h1>
                <p id="overlay-desc">控制小車躲避障礙物，帶蜥蜴出去兜風！</p>
                <div class="controls-hint">使用 A / D 鍵或 點擊左右兩側移動</div>
                <button id="start-btn">發動引擎</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
